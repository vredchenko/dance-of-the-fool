name: Build WebUI Only

on:
  workflow_dispatch:

jobs:
  webui-build:
    name: Build WebUI Static Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install reportlab ebooklib

      - name: Build webui data
        run: |
          python3 tools/build-webui-data.py

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install webui dependencies
        working-directory: webui
        run: npm ci

      - name: Build webui with commit SHA
        working-directory: webui
        env:
          PUBLIC_COMMIT_SHA: ${{ github.sha }}
          PUBLIC_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: npm run build

      - name: Upload webui bundle
        uses: actions/upload-artifact@v7
        with:
          name: webui-bundle-${{ github.sha }}
          path: webui/dist/
          retention-days: 90
